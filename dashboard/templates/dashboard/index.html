<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate - Luxury AI Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c5a059; /* Luxury Gold */
            --bg: #f8f9fa;
            --text: #333;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 40px; 
            color: var(--text);
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        
        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--primary); 
            text-align: center; 
            font-size: 3rem; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
        }
        .subtitle { 
            text-align: center; 
            color: #888; 
            margin-bottom: 40px; 
            font-size: 1.1rem;
            font-weight: 400;
        }

        .search-box { display: flex; gap: 15px; margin-bottom: 30px; }
        input[type="text"] { 
            flex: 1; padding: 20px; border: 1px solid #eee; border-radius: 14px; 
            font-size: 16px; outline: none; transition: 0.3s;
            background: #fafafa;
        }
        input[type="text"]:focus { 
            border-color: var(--accent); 
            background: #fff;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.15); 
        }

        button { 
            background: var(--primary); color: var(--accent); border: 1px solid var(--accent); 
            padding: 15px 40px; border-radius: 14px; cursor: pointer; 
            font-weight: 600; transition: 0.3s; font-size: 16px;
        }
        button:hover { background: var(--accent); color: white; transform: translateY(-2px); }

        /* Loading Spinner */
        #loader { display: none; text-align: center; margin: 30px 0; }
        .spinner {
            width: 45px; height: 45px; border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Card & Itinerary Styling */
        .result-card { 
            margin-top: 50px; padding: 40px; background: #fff; 
            border-top: 5px solid var(--accent); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Content Formatting */
        .itinerary-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .itinerary-content h4 {
            font-size: 1.3rem;
            color: var(--accent);
            margin-top: 25px;
            margin-bottom: 10px;
        }
        .itinerary-content ul {
            padding-left: 20px;
            list-style-type: none;
        }
        .itinerary-content li {
            margin-bottom: 15px;
            line-height: 1.7;
            position: relative;
        }
        .itinerary-content li::before {
            content: "•";
            color: var(--accent);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }
        .itinerary-content strong {
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TripMate</h1>
    <p class="subtitle">Precision Planning for Unforgettable Moments</p>

    <form method="POST" onsubmit="showLoader()">
        {% csrf_token %}
        <div class="search-box">
            <input type="text" name="query" placeholder="e.g. Plan a luxury street tour in Delhi" required>
            <button type="submit" id="submit-btn">Craft Itinerary</button>
        </div>
    </form>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: #666; font-style: italic;">Our agents are coordinating your bespoke experience...</p>
    </div>

    {% if result %}
    <div class="result-card">
        <div class="itinerary-content">
            {{ result|safe }}
        </div>
    </div>
    {% endif %}
</div>

<script>
    function showLoader() {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('submit-btn').style.opacity = '0.5';
        document.getElementById('submit-btn').innerText = 'Curating...';
        // Smooth scroll to loader
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
